map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# Simple rate limiting settings (adjust as needed)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

upstream ftir_api {
    server api:8000;
    keepalive 32;
}

upstream ftir_frontend {
    # 容器化打包后，前端自带 Nginx 跑在容器的 80 端口
    server frontend:80;
    keepalive 16;
}

server {
    listen 80;
    server_name _; # Replace with actual domain name when going to HTTPS
    client_max_body_size 100M;

    # Basic security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Needed later for Let's Encrypt certificate issuance
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API Proxy (REST)
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        limit_conn conn_limit 60;

        proxy_pass http://ftir_api;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket for Task Logs
    location ~ ^/api/v1/tasks/.*/ws$ {
        # This specifically enables WS upgrade for websocket endpoints
        proxy_pass http://ftir_api;
        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend Proxy
    location / {
        proxy_pass http://ftir_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
