services:
  nginx:
    image: nginx:1.29.7-perl
    container_name: ftir-nginx
    restart: unless-stopped
    depends_on:
      - api
      - frontend
    ports:
      - "80:80"
      # When you enable HTTPS, uncomment this:
      # - "443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/certbot/www:/var/www/certbot
      # Once you have a certificate, uncomment this to mount it:
      # - ./deploy/certbot/conf:/etc/letsencrypt:ro
    command: /bin/sh -c "nginx -g 'daemon off;'"