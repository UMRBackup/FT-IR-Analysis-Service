services:
  mysql:
    image: mysql:9.6.0
    container_name: ftir-mysql
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-mysql-root-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ftir}
      MYSQL_USER: ${MYSQL_USER:-ftir}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me-mysql-app-password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-change-me-mysql-root-password}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8.6.1
    container_name: ftir-redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ftir-backend:local
    working_dir: /app
    volumes:
      - ./backend:/app
      - ../Code:/code
      - ./shared_storage:/shared
    environment:
      TZ: Asia/Shanghai
      CODE_ROOT: /code
      STORAGE_ROOT: /shared
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-ftir-dev-jwt-2026-03-24-change-before-production}
      JWT_PREVIOUS_SECRET_KEY: ${JWT_PREVIOUS_SECRET_KEY:-}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      JWT_CURRENT_KID: ${JWT_CURRENT_KID:-v1}
      JWT_PREVIOUS_KID: ${JWT_PREVIOUS_KID:-}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-femtotest210}
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-ftir}:${MYSQL_PASSWORD:-change-me-mysql-app-password}@mysql:3306/${MYSQL_DATABASE:-ftir}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      CAS_API_KEY: ${CAS_API_KEY:-}
      SERP_API_KEY: ${SERP_API_KEY:-}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    expose:
      - "8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ftir-frontend:local
    container_name: ftir-frontend
    depends_on:
      - api

  # Container worker only handles preprocess/postprocess queues.
  # RPA queue must be consumed by Windows workers with OMNIC installed.
  worker_prepost:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ftir-backend:local
    working_dir: /app
    volumes:
      - ./backend:/app
      - ../Code:/code
      - ./shared_storage:/shared
    environment:
      TZ: Asia/Shanghai
      CODE_ROOT: /code
      STORAGE_ROOT: /shared
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-ftir-dev-jwt-2026-03-24-change-before-production}
      JWT_PREVIOUS_SECRET_KEY: ${JWT_PREVIOUS_SECRET_KEY:-}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      JWT_CURRENT_KID: ${JWT_CURRENT_KID:-v1}
      JWT_PREVIOUS_KID: ${JWT_PREVIOUS_KID:-}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-femtotest210}
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-ftir}:${MYSQL_PASSWORD:-change-me-mysql-app-password}@mysql:3306/${MYSQL_DATABASE:-ftir}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      CAS_API_KEY: ${CAS_API_KEY:-}
      SERP_API_KEY: ${SERP_API_KEY:-}
    command: celery -A app.celery_app:celery_app worker --loglevel=info -Q preprocess_queue,postprocess_queue
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql_data:
